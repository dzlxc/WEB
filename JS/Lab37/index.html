<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Лабораторна робота — Props & State</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0c0e14;
            --surface:   #13151f;
            --surface2:  #1a1d2e;
            --border:    #2a2d42;
            --accent:    #5b7fff;
            --accent2:   #a78bfa;
            --green:     #34d399;
            --yellow:    #fbbf24;
            --red:       #f87171;
            --text:      #e8eaf2;
            --muted:     #6b7280;
            --radius:    14px;
            --font-head: 'Unbounded', sans-serif;
            --font-body: 'Golos Text', sans-serif;
        }

        body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: none; }
        }
        @keyframes pop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .app {
            max-width: 700px;
            margin: 0 auto;
            padding: 2rem 1.25rem 4rem;
            animation: fadeIn .4s ease;
        }

        /* ── HEADER ── */
        .header { margin-bottom: 2rem; }
        .header-label {
            font-family: var(--font-head);
            font-size: .6rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: .5rem;
        }
        .header h1 {
            font-family: var(--font-head);
            font-size: 1.35rem;
            font-weight: 700;
            line-height: 1.3;
            background: linear-gradient(135deg, var(--text) 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p { color: var(--muted); font-size: .88rem; margin-top: .4rem; }

        /* ── TABS ── */
        .tabs {
            display: flex;
            gap: .4rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: .35rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .tab {
            flex: 1;
            min-width: 90px;
            padding: .55rem .5rem;
            border: none;
            border-radius: calc(var(--radius) - 4px);
            background: transparent;
            color: var(--muted);
            font-family: var(--font-body);
            font-size: .82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
        }
        .tab.active {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        /* ── CARD ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem;
            position: relative;
            animation: fadeIn .3s ease;
            margin-bottom: 1rem;
        }
        .card-badge {
            position: absolute;
            top: -1px; right: 1.2rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 8px 8px;
            font-size: .6rem;
            font-family: var(--font-head);
            letter-spacing: .05em;
            color: var(--accent);
            padding: .25rem .7rem;
        }

        /* ── USER CARD ── */
        .user-grid { display: flex; flex-direction: column; gap: .75rem; margin-top: .5rem; }
        .user-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: .85rem 1.1rem;
            transition: border-color .15s;
        }
        .user-row:hover { border-color: var(--accent); }
        .user-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-head);
            font-size: .9rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .user-details h3 { font-size: .95rem; font-weight: 600; margin-bottom: .2rem; }
        .user-details p  { font-size: .8rem; color: var(--muted); }
        .props-tag {
            margin-left: auto;
            font-size: .65rem;
            font-family: var(--font-head);
            background: color-mix(in srgb, var(--accent) 15%, transparent);
            color: var(--accent);
            border-radius: 5px;
            padding: .2rem .6rem;
            flex-shrink: 0;
        }

        /* ── COUNTER ── */
        .counter-wrap { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; margin-top: .75rem; }
        .counter-track {
            width: 100%;
            height: 6px;
            background: var(--surface2);
            border-radius: 99px;
            overflow: hidden;
        }
        .counter-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 99px;
            transition: width .3s ease;
        }
        .counter-display {
            font-family: var(--font-head);
            font-size: 5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }
        .counter-display.pop { animation: pop .2s ease; }
        .counter-btns { display: flex; gap: .75rem; }

        /* ── BUTTONS ── */
        .btn {
            padding: .6rem 1.4rem;
            border-radius: 8px;
            border: none;
            font-family: var(--font-body);
            font-size: .88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
        }
        .btn:active { transform: scale(.96); }
        .btn-primary   { background: var(--accent);  color: #fff; }
        .btn-primary:hover  { background: #7090ff; }
        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
        .btn-ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { color: var(--text); border-color: var(--text); }
        .btn-danger {
            background: color-mix(in srgb, var(--red) 15%, transparent);
            color: var(--red);
            border: 1px solid color-mix(in srgb, var(--red) 30%, transparent);
        }
        .btn-danger:hover { background: color-mix(in srgb, var(--red) 25%, transparent); }

        /* ── TODO ── */
        .input-row { display: flex; gap: .6rem; margin-bottom: 1rem; }
        .input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: .6rem .9rem;
            color: var(--text);
            font-family: var(--font-body);
            font-size: .88rem;
            outline: none;
            transition: border-color .15s;
        }
        .input:focus { border-color: var(--accent); }
        .input::placeholder { color: var(--muted); }
        .input.error { border-color: var(--red); }

        .todo-list { display: flex; flex-direction: column; gap: .4rem; }
        .todo-item {
            display: flex;
            align-items: center;
            gap: .75rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: .65rem 1rem;
            transition: border-color .15s;
            animation: fadeIn .2s ease;
        }
        .todo-item.done { opacity: .5; }
        .todo-item:hover { border-color: var(--border); }
        .todo-check {
            width: 18px; height: 18px;
            border-radius: 5px;
            border: 2px solid var(--border);
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: .7rem;
            transition: all .15s;
        }
        .todo-check.checked { background: var(--green); border-color: var(--green); color: #000; }
        .todo-text { flex: 1; font-size: .9rem; }
        .todo-text.done { text-decoration: line-through; color: var(--muted); }
        .btn-rm {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 6px;
            width: 26px; height: 26px;
            font-size: .72rem;
            cursor: pointer;
            transition: all .15s;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .btn-rm:hover {
            background: color-mix(in srgb, var(--red) 15%, transparent);
            border-color: var(--red);
            color: var(--red);
        }
        .section-label {
            font-family: var(--font-head);
            font-size: .7rem;
            color: var(--muted);
            letter-spacing: .05em;
            margin-bottom: .75rem;
        }
        .empty { color: var(--muted); font-size: .88rem; text-align: center; padding: .75rem 0; }
        .todo-stats {
            display: flex;
            gap: .5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .stat-chip {
            font-size: .72rem;
            font-family: var(--font-head);
            padding: .2rem .7rem;
            border-radius: 99px;
            border: 1px solid var(--border);
            color: var(--muted);
        }
        .stat-chip.active { border-color: var(--accent); color: var(--accent); }

        /* ── SHOP ── */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; margin-bottom: 1rem; }
        @media (max-width: 480px) { .shop-grid { grid-template-columns: 1fr; } }
        .product-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: .4rem;
            animation: fadeIn .2s ease;
            transition: border-color .15s;
        }
        .product-card:hover { border-color: var(--accent); }
        .product-icon { font-size: 1.6rem; }
        .product-name { font-weight: 600; font-size: .92rem; }
        .product-price {
            font-family: var(--font-head);
            font-size: .85rem;
            color: var(--green);
        }
        .add-product-form {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.1rem;
            display: flex;
            flex-direction: column;
            gap: .6rem;
        }
        .form-title {
            font-family: var(--font-head);
            font-size: .7rem;
            color: var(--muted);
            letter-spacing: .05em;
            margin-bottom: .1rem;
        }
        .form-row { display: flex; gap: .6rem; }
        .error-msg { color: var(--red); font-size: .78rem; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState } = React;

    /* ══════════════════════════════════════════
       ЗАВДАННЯ 1 — props
       UserCard отримує name та email через props
    ══════════════════════════════════════════ */
    function UserCard({ name, email, color }) {
        const initials = name.split(" ").map(w => w[0]).join("").toUpperCase();
        return (
            <div className="user-row">
                <div className="user-avatar" style={{ background: color }}>{initials}</div>
                <div className="user-details">
                    <h3>{name}</h3>
                    <p>{email}</p>
                </div>
                <span className="props-tag">props</span>
            </div>
        );
    }

    function Task1() {
        const users = [
            { name: "Олексій Мельник",  email: "melnyk@example.com",   color: "#5b7fff" },
            { name: "Марія Шевченко",   email: "shevchenko@example.com",color: "#a78bfa" },
            { name: "Дмитро Іванченко", email: "ivanchenko@example.com",color: "#34d399" },
        ];
        return (
            <div className="card">
                <span className="card-badge">Завдання 1 — props</span>
                <div className="user-grid">
                    {users.map((u, i) => <UserCard key={i} {...u} />)}
                </div>
            </div>
        );
    }

    /* ══════════════════════════════════════════
       ЗАВДАННЯ 2 — state
       Counter зберігає count у useState
    ══════════════════════════════════════════ */
    function Counter() {
        const MAX = 20;
        const [count, setCount] = useState(0);
        const [anim,  setAnim]  = useState(false);

        const trigger = (fn) => {
            fn();
            setAnim(true);
            setTimeout(() => setAnim(false), 200);
        };

        const inc = () => trigger(() => setCount(c => Math.min(MAX, c + 1)));
        const dec = () => trigger(() => setCount(c => Math.max(0,   c - 1)));
        const rst = () => trigger(() => setCount(0));

        const pct = (count / MAX) * 100;

        return (
            <div className="card">
                <span className="card-badge">Завдання 2 — state</span>
                <div className="counter-wrap">
                    <div className="counter-track">
                        <div className="counter-fill" style={{ width: pct + "%" }} />
                    </div>
                    <div className={`counter-display ${anim ? "pop" : ""}`}>{count}</div>
                    <div className="counter-btns">
                        <button className="btn btn-secondary" onClick={dec}>−</button>
                        <button className="btn btn-primary"   onClick={inc}>+ Збільшити</button>
                        <button className="btn btn-ghost"     onClick={rst}>↺</button>
                    </div>
                </div>
            </div>
        );
    }

    /* ══════════════════════════════════════════
       ЗАВДАННЯ 3 — взаємодія компонентів
       TodoApp (батько) → TodoList (дочірній)
       Додавання у батьку, відображення в дочірньому
    ══════════════════════════════════════════ */
    function TodoList({ todos, onToggle, onRemove }) {
        if (todos.length === 0) return <p className="empty">Список порожній</p>;
        return (
            <div className="todo-list">
                {todos.map(t => (
                    <div key={t.id} className={`todo-item ${t.done ? "done" : ""}`}>
                        <div
                            className={`todo-check ${t.done ? "checked" : ""}`}
                            onClick={() => onToggle(t.id)}
                        >
                            {t.done && "✓"}
                        </div>
                        <span className={`todo-text ${t.done ? "done" : ""}`}>{t.text}</span>
                        <button className="btn-rm" onClick={() => onRemove(t.id)}>✕</button>
                    </div>
                ))}
            </div>
        );
    }

    function TodoApp() {
        const [todos, setTodos] = useState([
            { id: 1, text: "Вивчити props у React",      done: false },
            { id: 2, text: "Розібрати useState",          done: false },
            { id: 3, text: "Зробити лабораторну роботу",  done: false },
        ]);
        const [input, setInput] = useState("");

        const add = () => {
            if (!input.trim()) return;
            setTodos(prev => [...prev, { id: Date.now(), text: input.trim(), done: false }]);
            setInput("");
        };
        const toggle = (id) => setTodos(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t));
        const remove = (id) => setTodos(prev => prev.filter(t => t.id !== id));

        const done  = todos.filter(t =>  t.done).length;
        const total = todos.length;

        return (
            <div className="card">
                <span className="card-badge">Завдання 3 — взаємодія компонентів</span>

                <p className="section-label">Батьківський компонент — TodoApp</p>
                <div className="input-row">
                    <input
                        className="input"
                        placeholder="Нове завдання..."
                        value={input}
                        onChange={e => setInput(e.target.value)}
                        onKeyDown={e => e.key === "Enter" && add()}
                    />
                    <button className="btn btn-primary" onClick={add}>Додати</button>
                </div>

                <p className="section-label">Дочірній компонент — TodoList (отримує дані через props)</p>
                <TodoList todos={todos} onToggle={toggle} onRemove={remove} />

                <div className="todo-stats">
                    <span className={`stat-chip ${total > 0 ? "active" : ""}`}>Всього: {total}</span>
                    <span className={`stat-chip ${done > 0 ? "active" : ""}`}>Виконано: {done}</span>
                    <span className="stat-chip">Залишилось: {total - done}</span>
                </div>
            </div>
        );
    }

    /* ══════════════════════════════════════════
       ДОДАТКОВЕ — ShopApp
       Список товарів + додавання через дочірній
    ══════════════════════════════════════════ */
    const ICONS = ["📦","🛒","🎁","💡","🖥️","📱","🎧","⌚","🖨️","🔌"];

    function AddProductForm({ onAdd }) {
        const [name,  setName]  = useState("");
        const [price, setPrice] = useState("");
        const [err,   setErr]   = useState("");

        const handleAdd = () => {
            if (!name.trim())           { setErr("Введіть назву товару"); return; }
            if (!price || isNaN(price) || +price <= 0) { setErr("Введіть коректну ціну"); return; }
            onAdd({ name: name.trim(), price: +price });
            setName(""); setPrice(""); setErr("");
        };

        return (
            <div className="add-product-form">
                <p className="form-title">Дочірній компонент — AddProductForm (передає onAdd через props)</p>
                <div className="form-row">
                    <input
                        className={`input ${err ? "error" : ""}`}
                        placeholder="Назва товару"
                        value={name}
                        onChange={e => { setName(e.target.value); setErr(""); }}
                        onKeyDown={e => e.key === "Enter" && handleAdd()}
                    />
                    <input
                        className={`input ${err ? "error" : ""}`}
                        placeholder="Ціна (₴)"
                        value={price}
                        style={{ maxWidth: "110px" }}
                        onChange={e => { setPrice(e.target.value); setErr(""); }}
                        onKeyDown={e => e.key === "Enter" && handleAdd()}
                    />
                    <button className="btn btn-primary" onClick={handleAdd}>Додати</button>
                </div>
                {err && <p className="error-msg">{err}</p>}
            </div>
        );
    }

    function ProductCard({ name, price, icon }) {
        return (
            <div className="product-card">
                <span className="product-icon">{icon}</span>
                <span className="product-name">{name}</span>
                <span className="product-price">₴ {price.toLocaleString("uk-UA")}</span>
            </div>
        );
    }

    function ShopApp() {
        const [products, setProducts] = useState([
            { id: 1, name: "Ноутбук",     price: 32000, icon: "🖥️" },
            { id: 2, name: "Навушники",   price: 2500,  icon: "🎧" },
            { id: 3, name: "Смартфон",    price: 18000, icon: "📱" },
            { id: 4, name: "Розумний годинник", price: 7500, icon: "⌚" },
        ]);

        const addProduct = ({ name, price }) => {
            const icon = ICONS[Math.floor(Math.random() * ICONS.length)];
            setProducts(prev => [...prev, { id: Date.now(), name, price, icon }]);
        };

        const total = products.reduce((s, p) => s + p.price, 0);

        return (
            <div className="card">
                <span className="card-badge">Додаткове — ShopApp</span>
                <p className="section-label" style={{ marginBottom: ".9rem" }}>
                    Батьківський компонент — ShopApp (зберігає список товарів у state)
                </p>
                <div className="shop-grid">
                    {products.map(p => <ProductCard key={p.id} {...p} />)}
                </div>
                <div style={{ marginBottom: "1rem" }}>
            <span className="stat-chip active" style={{ padding: ".35rem .9rem", borderRadius: "8px" }}>
              Загальна сума: ₴ {total.toLocaleString("uk-UA")}
            </span>
                </div>
                <AddProductForm onAdd={addProduct} />
            </div>
        );
    }

    /* ══════════════════════════════════════════
       ГОЛОВНИЙ ДОДАТОК
    ══════════════════════════════════════════ */
    function App() {
        const [tab, setTab] = useState(0);
        const tabs = ["Завдання 1", "Завдання 2", "Завдання 3", "Додаткове"];

        return (
            <div className="app">
                <header className="header">
                    <p className="header-label">Лабораторна робота · React</p>
                    <h1>Props & State: взаємодія між компонентами</h1>
                    <p>Пропси, стан та передача даних між компонентами</p>
                </header>

                <div className="tabs">
                    {tabs.map((t, i) => (
                        <button
                            key={i}
                            className={`tab ${tab === i ? "active" : ""}`}
                            onClick={() => setTab(i)}
                        >
                            {t}
                        </button>
                    ))}
                </div>

                {tab === 0 && <Task1 />}
                {tab === 1 && <Counter />}
                {tab === 2 && <TodoApp />}
                {tab === 3 && <ShopApp />}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
</script>
</body>
</html>
